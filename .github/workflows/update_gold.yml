# STEP 3 — Daily automation
# Runs fetch_gold.py every day on GitHub's servers (free) and commits the
# refreshed gold_lebanon_data.json back to the repo, so the Flutter app
# always reads fresh data from the raw URL — no backend needed.

name: Update Gold Data

on:
  schedule:
    # 06:00 UTC daily = 09:00 Beirut (EEST). GitHub cron is UTC.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write          # allow the workflow to push the updated JSON

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the gold price script
        run: python fetch_gold.py

      - name: Commit and push if the data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gold_lebanon_data.json
          if git diff --cached --quiet; then
            echo "No price change today — nothing to commit."
          else
            git commit -m "chore: daily gold price update ($(date -u +%Y-%m-%d))"
            git push
          fi
